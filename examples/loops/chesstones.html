<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mighty mighty chess tones</title>
</head>

<body>
    <button id="go">s t a r t </button>
</body>


<script>
    // 1. Create Audio Context
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // 2. Create Oscillator (sound generator) and Gain (volume)
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    // 3. Connect nodes


    // 4. Configure Tone
    function tone(length, freq = 440, type = "sine") {
        console.log(`${freq} for ${length}`);
        let oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        // 3. Connect nodes
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        oscillator.frequency.value = freq;
        oscillator.type = type;
        oscillator.start(now);
        return new Promise(function (resolve, reject) {
            window.setTimeout(() => {
                console.log("done");
                oscillator.stop();
                oscillator.disconnect();
                oscillator = null;
                resolve();
            }, length);
        });
    }

    let button = document.querySelector("#go");

    button.addEventListener("click", function () {
        startLoops();
    });

    async function startLoops() {

        for (let i = 0; i < 5; i++) {
   
            for (let j = 0; j < 5; j++) {
                if ((i + j) % 2 == 0) {
                    await tone(300, 400);
                } else {
                    await tone(300, 440, "triangle");
                }
            }
            console.log("end of line");
        }

    }



</script>

</html>
