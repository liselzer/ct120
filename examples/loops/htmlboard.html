<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html board</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: gray;
        }

        .square {
            display: inline-block;
        }

        @keyframes blk2purp {
            from {
                background-color: black;
            }

            to {
                background-color: purple;
            }
        }

        @keyframes white2purp {
            from {
                background-color: white;
            }

            to {
                background-color: purple;
            }
        }
    </style>
</head>

<body>

</body>

<script>
    let thecount = 8;
    let colors = ["black", "white"];
    let anims = ["blk2purp", "white2purp"];

    //the url to this page
    let theUrl = window.location.href;
    console.log(theUrl);
    let url = new URL(theUrl);
    let mode = url.searchParams.get("mode") || "background";
    console.log(mode);


    for (let i = 0; i < thecount; i++) {

        for (let j = 0; j < thecount; j++) {
            if ((i + j) % 2 == 0) {
                square(0, mode);
            } else {
                square(1, mode);
            }
        }
        let br = document.createElement("br");
        document.body.appendChild(br);
    }


    function square(color, mode) {
        //mode = "background"; //change to animation for animation!

        let div = document.createElement("div");
        div.style.height = `${100 / thecount}vw`;
        div.style.width = `${100 / thecount}vw`;
        if (mode == "background") {
            div.style.background = colors[color];
        } else if (mode == "animation") {
            let anim = anims[color] + " 3s linear infinite alternate";
            div.style.animation = anim;
        }
        div.innerHTML = "&nbsp;";
        div.classList.add("square");
        document.body.appendChild(div);
    }
</script>

</html>
