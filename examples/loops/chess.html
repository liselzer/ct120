<script>
    console.log("hello ct120!");

    let chessboard = "";
    let binding = 8;

    for (let i = 0; i < binding; i++){
        let line = "";
        for (let j = 0; j < binding; j++){
           if (i % 2 == 0){
            if (j % 2 == 0){
                line += "#";
            } else {
                line += " ";
            }
        } else {
            if (j % 2 == 1){
                line += "#";
            } else {
                line += " ";
            }
        }
    }
        chessboard += (line + "\n");
    }
    console.log(chessboard);

</script>
